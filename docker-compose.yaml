# docker-compose.yaml — Yomitori 推論サーバー・学習環境
#
# 使用方法:
#   docker compose build base     # ベースイメージをビルド（初回のみ・重い）
#   docker compose build           # 全イメージをビルド
#   docker compose up serve        # 推論サーバー起動（ポート8080）
#   docker compose up notebook     # Jupyter Notebook（ポート8888）
#
# ※ restart ポリシーを設定していないため、Docker Desktop / WSL2 起動時に
#    コンテナが自動で立ち上がることはありません。

services:
  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: yomitori:base
    profiles: ["build-only"]

  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile.infer
    image: yomitori:infer
    volumes:
      - .:/opt/ml/code
      - yomitori-models:/opt/ml/model
      - yomitori-hf-cache:/root/.cache/huggingface
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/opt/ml/code
      - YOMITORI_MODEL_DIR=/opt/ml/model

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: yomitori:train
    volumes:
      - .:/opt/ml/code
      - yomitori-models:/opt/ml/model
      - yomitori-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/opt/ml/code

  notebook:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
      - yomitori-hf-cache:/root/.cache/huggingface
    ports:
      - "8888:8888"
    environment:
      - PYTHONPATH=/opt/ml/code
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --notebook-dir=/opt/ml/code/notebooks

volumes:
  yomitori-models:
  yomitori-hf-cache: