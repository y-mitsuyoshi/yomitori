# docker-compose.yaml — Yomitori 開発・学習・推論環境
#
# 使用方法:
#   docker compose build base      # ベースイメージをビルド（初回のみ・重い）
#   docker compose build            # 全イメージをビルド（ベース前提）
#   docker compose up serve          # 推論サーバー起動（常駐・ポート8080）
#   docker compose up notebook      # Jupyter Notebook（ポート8888）
#   docker compose run --rm <svc>   # 1回だけ実行して終了
#
# サービス一覧: serve, train, generate, dev, test, check-licenses, notebook
#
# ※ restart ポリシーを設定していないため、Docker Desktop / WSL2 起動時に
#    コンテナが自動で立ち上がることはありません。

services:
  base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: yomitori:base
    profiles: ["build-only"]

  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile.infer
    image: yomitori:infer
    volumes:
      - .:/opt/ml/code
      - yomitori-models:/opt/ml/model
      - yomitori-hf-cache:/root/.cache/huggingface
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/opt/ml/code
      - YOMITORI_MODEL_DIR=/opt/ml/model
    restart: "no"

  generate:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
      - yomitori-hf-cache:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/opt/ml/code
    command: >
      python -m training.generate_synthetic_data
      --document_type driver_license_front
      --count 500
      --output /opt/ml/code/data/synthetic/driver_license/

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: yomitori:train
    volumes:
      - .:/opt/ml/code
      - yomitori-models:/opt/ml/model
      - yomitori-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/opt/ml/code
    command: >
      python -m training.train_trocr
      --data_dir /opt/ml/code/data/synthetic/driver_license/
      --output_dir /opt/ml/model
      --epochs 5
      --batch_size 8

  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
      - yomitori-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONPATH=/opt/ml/code
    stdin_open: true
    tty: true

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
    environment:
      - PYTHONPATH=/opt/ml/code
    command: python -m pytest tests/ -v

  check-licenses:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
    environment:
      - PYTHONPATH=/opt/ml/code
    command: bash scripts/check_licenses.sh

  notebook:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: yomitori:dev
    volumes:
      - .:/opt/ml/code
      - yomitori-hf-cache:/root/.cache/huggingface
    ports:
      - "8888:8888"
    environment:
      - PYTHONPATH=/opt/ml/code
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --notebook-dir=/opt/ml/code/notebooks

volumes:
  yomitori-models:
  yomitori-hf-cache: